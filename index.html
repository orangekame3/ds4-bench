<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>📋 Todo App</h1>

    <div class="input-section">
      <input type="text" id="todo-input" placeholder="Add a new task..." autofocus>
      <button id="add-btn" class="btn primary">Add</button>
    </div>

    <div class="controls">
      <button id="select-all-btn" class="btn secondary">Select All</button>
      <button id="clear-completed-btn" class="btn secondary">Clear Completed</button>
      <span id="task-count" class="task-count">0 tasks</span>
    </div>

    <ul id="todo-list" class="todo-list"></ul>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
